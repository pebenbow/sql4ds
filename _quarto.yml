project:
  type: book
  output-dir: _book

book:
  title: "SQL for Data Science"
  subtitle: "Querying, Designing, and Deploying Databases"
  reader-mode: true
  author: "Pete Benbow"
  cover-image: cover.png
  favicon: cover.png
  site-url: https://sql4ds.com/
  repo-url: https://github.com/pebenbow/sql4ds
  repo-branch: main
  repo-actions: [edit, issue]

  page-footer:
    left: |
      _SQL for Data Science_ was written by Pete Benbow
    right: |
      This book was written with <a href="https://quarto.org/">Quarto</a>.
  chapters:
    - index.qmd

    - part: 00-intro.qmd
      chapters:
        - 01-why-learn-sql.qmd
        - 02-setup.qmd

    - part: 10-query.qmd
      chapters:
        - 11-select-statements.qmd
        - 12-data-types.qmd
        - 13-aggregating.qmd
        - 14-joins.qmd
        - 15-set-operations.qmd

    - part: 20-analyze.qmd
      chapters:
        - 21-conditional.qmd
        - 22-subqueries.qmd
        - 23-window-functions.qmd
        - 24-stats-functions.qmd

    - part: 30-design.qmd
      chapters:
        - 31-keys-and-integrity.qmd
        - 32-er-diagrams.qmd
        - 33-normal-forms.qmd
        - 34-create-table.qmd
        - 35-views.qmd
        - 36-building-schema.qmd
        - 37-functions.qmd
        - 38-procedures.qmd
        - 39-triggers.qmd

    - part: 40-optimize.qmd
      chapters:
        - 41-explain.qmd
        - 42-indexes.qmd
        - 43-optimization-patterns.qmd

    - part: 50-secure.qmd
      chapters:
        - 51-roles.qmd
        - 52-privileges.qmd
        - 53-sqli.qmd

    - part: 60-load.qmd
      chapters:
        - 61-extracting-data.qmd
        - 62-transforming-with-polars.qmd
        - 63-loading-with-sqlalchemy.qmd
        - 64-etl-pipeline.qmd

    - part: 70-deploy.qmd
      chapters:
        - 71-supabase-setup.qmd
        - 72-supabase-vscode.qmd
        - 73-database-migrations.qmd

    - 99-references.qmd

filters:
  - quarto-dbml

dbml:
  theme: light
  notation: crowsfoot
  routing: smooth

bibliography: references.bib

format:
  html:
    lightbox: true
    author-meta: "Pete Benbow"
    callout-appearance: simple
    link-external-newwindow: true
    theme: cosmo
    syntax-definitions:
      - _extensions/quarto-dbml/dbml.xml
