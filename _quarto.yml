project:
  type: book
  output-dir: _book

book:
  title: "SQL for Data Science"
  subtitle: "Querying, Designing, and Deploying Databases"
  reader-mode: true
  author: "Pete Benbow"
  cover-image: cover.png
  favicon: cover.png
  site-url: https://sql4ds.com/
  repo-url: https://github.com/pebenbow/open-sql
  repo-branch: main
  repo-actions: [edit, issue]

  page-footer:
    left: |
      _SQL for Data Science_ was written by Pete Benbow
    right: |
      This book was written with <a href="https://quarto.org/">Quarto</a>.
  chapters:
    - index.qmd

    - part: intro.qmd
      chapters:
        - 01-why-learn-sql.qmd
        - 02-setup.qmd

    - part: query.qmd
      chapters:
        - 11-select-statements.qmd
        - 12-data-types.qmd
        - 13-joins.qmd
        - 14-set-operations.qmd

    - part: design.qmd
      chapters:
        - 21-keys-and-integrity.qmd
        - 22-er-diagrams.qmd
        - 23-normal-forms.qmd
        - 24-create-table.qmd

    - part: secure.qmd
      chapters:
        - 31-roles.qmd

    - part: deploy.qmd
      chapters:
        - 41-supabase-setup.qmd
        - 42-supabase-vscode.qmd
        - 43-database-migrations.qmd

    - part: load.qmd
      chapters:
        - 51-extracting-data.qmd
        - 52-transforming-with-polars.qmd
        - 53-loading-with-sqlalchemy.qmd
        - 54-etl-pipeline.qmd

    - references.qmd

filters:
  - quarto-dbml

dbml:
  theme: light
  notation: crowsfoot
  routing: smooth

bibliography: references.bib

format:
  html:
    lightbox: true
    author-meta: "Pete Benbow"
    callout-appearance: simple
    link-external-newwindow: true
    theme: cosmo
    syntax-definitions:
      - _extensions/quarto-dbml/dbml.xml
